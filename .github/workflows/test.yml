name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[semantic]"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Verify zero core dependencies
        run: |
          python -c "
          import importlib.metadata
          d = importlib.metadata.requires('datagate-llm')
          core = [x for x in (d or []) if 'extra' not in x]
          assert core == [], f'Unexpected core deps: {core}'
          "
